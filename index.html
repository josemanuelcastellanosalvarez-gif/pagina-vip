<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rincón VIP 💖</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

</head>

<body>

<div id="login">
<h2>Acceso VIP 💌</h2>
<input type="password" id="password" placeholder="Ingrese contraseña">
<button onclick="checkPassword()">Entrar</button>
</div>


<div id="vipContent">

<h1>Bienvenido a tu rincón especial 💖</h1>

<div id="contador"></div>

<div id="noteBox"></div>


<div id="playerContainer">

<img src="images/disc.png" id="disc">

<div>

<p id="songName"></p>

<audio id="bgMusic"></audio>

<button onclick="toggleMusic()">▶️ / ⏸</button>

</div>

</div>


<div class="activities">

<button onclick="startMiniGame()">🎮 Mini juego</button>

<button onclick="startFlappy()">🐦 Flappy Love</button>

<button onclick="showLoveLetter()">💌 Carta secreta</button>

<button onclick="startFireworks()">🎆 Celebrar</button>

</div>


<div id="imageContainer">

<h3>📷 Galería</h3>

<input type="file" id="imageUpload">

<div id="displayImages"></div>

</div>


<div id="chatContainer">

<h3>💬 Chat secreto</h3>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Escribe algo">

<button onclick="sendMessage()">Enviar</button>

</div>

</div>


<div id="letter" style="display:none">

<h2>💌 Carta secreta</h2>

<p>
Este rincón fue creado para alguien muy especial.
Cada detalle está hecho para recordarte lo importante que eres 💖
</p>

<button onclick="closeLetter()">Cerrar</button>

</div>


<canvas id="fireworks"></canvas>

<canvas id="flappyCanvas" width="400" height="300"></canvas>

<script src="script.js"></script>

</body>
</html>
