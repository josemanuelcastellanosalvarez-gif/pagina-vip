<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rincón VIP 💖</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
color:white;
margin:0;
height:100vh;

background-size:cover;
background-position:center;
background-repeat:no-repeat;

transition: background-image 2s ease-in-out;
}

#login{
margin-top:120px;
}

input{
padding:10px;
font-size:16px;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
margin:10px;
border:none;
border-radius:8px;
background:#ff4d88;
color:white;
}

button:hover{
background:#ff1f6a;
}

#vipContent{
display:none;
margin-top:40px;
}

#disc{
width:150px;
margin:20px;
}

.activities{
margin-top:20px;
}

</style>
</head>

<body>

<div id="login">

<h2>Acceso VIP 💌</h2>

<input type="password" id="password" placeholder="Ingrese contraseña">

<br><br>

<button onclick="checkPassword()">Entrar</button>

</div>


<div id="vipContent">

<h1>Bienvenido a tu rincón especial 💖</h1>

<img src="images/disc.png" id="disc">

<h3>🎵 Música</h3>

<audio controls>

<source src="musica/romance1.mp3" type="audio/mpeg">
<source src="musica/romance2.mp3" type="audio/mpeg">
<source src="musica/romance3.mp3" type="audio/mpeg">
<source src="musica/romance4.mp3" type="audio/mpeg">
<source src="musica/romance5.mp3" type="audio/mpeg">

</audio>

<h3>Actividades 💖</h3>

<div class="activities">

<button onclick="alert('🎲 Mini juego secreto')">Mini juego</button>

<button onclick="alert('💌 Escribe un mensaje romántico')">Actividad romántica</button>

<button onclick="alert('💬 Trivia romántica')">Trivia</button>

<button onclick="alert('🌹 Elige tu cita favorita')">Elegir cita</button>

<button onclick="alert('🎨 Dibuja algo para mí ❤️')">Actividad creativa</button>

</div>

</div>


<script>

function checkPassword(){

let pass = document.getElementById("password").value;

if(pass === "TACHETONCITA❤️‍🔥"){

document.getElementById("login").style.display="none";
document.getElementById("vipContent").style.display="block";

}

else{

alert("Contraseña incorrecta");

}

}


/* FONDOS DE ATARDECER */

let fondos = [
"images/sunset1.jpg",
"images/sunset2.jpg",
"images/sunset3.jpg"
];

let i = 0;

function cambiarFondo(){

document.body.style.backgroundImage = "url('" + fondos[i] + "')";

i++;

if(i >= fondos.length){
i = 0;
}

}

cambiarFondo();

setInterval(cambiarFondo, 5000);

</script>

</body>
</html>
